<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Magic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #050505; color: #ffffff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; text-align: center; padding-bottom: 50px; position: relative; }
        
        #muteBtn { position: absolute; top: 10px; right: 0; z-index: 1000; padding: 6px 12px; background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid #00f2fe; border-radius: 20px; cursor: pointer; font-size: 11px; }

        .profile-section { margin-top: 20px; margin-bottom: 20px; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 600; margin-top: 10px; }
        .tg-logo { width: 18px; height: 18px; vertical-align: middle; margin-right: 5px; }
        
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 15px; margin-bottom: 20px; }
        .social-links img { transition: 0.3s; }
        .social-links img:hover { transform: scale(1.1); }
        
        .desc-text { color: #aaa; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        .btn-telegram { display: block; width: 100%; padding: 12px; background: #fff; color: #000; text-decoration: none; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }

        .image-showcase { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 12px; margin-top: 20px; }
        .section-title { font-size: 12px; color: #00f2fe; margin-bottom: 10px; letter-spacing: 1px; }
        img-comparison-slider { width: 100%; border-radius: 16px; overflow: hidden; aspect-ratio: 1 / 1; }
        img-comparison-slider img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-prompt { width: 100%; margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #333; border-radius: 10px; cursor: pointer; font-weight: 600; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background-color: #111; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid #333; text-align: center; }
        .btn-copy { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="site.mp3" type="audio/mpeg"></audio>

<div class="container">
    <button id="muteBtn" onclick="toggleMute()">🔇 Unmute</button>

    <div class="profile-section">
        <img src="profile.jpg" class="profile-img">
        <div class="profile-name">
            <a href="https://t.me/xred20" target="_blank" style="text-decoration:none; color:white;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="tg-logo">@Hamimbai
            </a>
        </div>
        
        <div class="social-links">
            <a href="https://www.facebook.com/share/1D7jsTdZXV/?mibextid=wwXIfr" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="30" height="30"></a>
            <a href="https://www.instagram.com/hamim_xm?igsh=a21vcGZnNTQ2MW9m&utm_source=qr" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" width="30" height="30"></a>
        </div>
        
        <div class="desc-text">
            <p>Please Join Our Telegram Channel To Get Prompts Easy And Earn Money</p>
            <p style="color:#00f2fe; margin-top:5px;">আমাদের টেলিগ্রাম চ্যানেলে জয়েন করুন আরো সুবিধা পেতে 👇</p>
        </div>
    </div>

    <a href="https://t.me/xred20" target="_blank" class="btn-telegram">🚀 Join Our Telegram Channel</a>

    <div class="image-showcase">
        <div class="section-title">✨ AI PHOTO MAGIC CASE 1</div>
        <img-comparison-slider>
            <img slot="first" src="original.jpg">
            <img slot="second" src="aiedited.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('এখানে প্রম্পট ১ দিন')">View Prompt</button>
    </div>

    <div class="image-showcase">
        <div class="section-title">✨ AI PHOTO MAGIC CASE 2</div>
        <img-comparison-slider>
            <img slot="first" src="original.jpg">
            <img slot="second" src="aiedited.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('এখানে প্রম্পট ২ দিন')">View Prompt</button>
    </div>

    <div class="image-showcase">
        <div class="section-title">✨ AI PHOTO MAGIC CASE 3</div>
        <img-comparison-slider>
            <img slot="first" src="hamim1.jpg">
            <img slot="second" src="hamim1edit.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('এখানে প্রম্পট ৩ দিন')">View Prompt</button>
    </div>

    <div class="image-showcase">
        <div class="section-title">✨ AI PHOTO MAGIC CASE 4</div>
        <img-comparison-slider>
            <img slot="first" src="original_4.jpg">
            <img slot="second" src="aiedited_4.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('এখানে প্রম্পট ৪ দিন')">View Prompt</button>
    </div>
</div>

<div id="promptModal" class="modal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; color:white; font-size:24px;" onclick="closeModal()">✕</span>
        <h4 style="color:#fff; margin-bottom:10px;">Prompt</h4>
        <div id="promptText" style="margin:10px 0; color:#ccc; background:#000; padding:15px; border-radius:8px; border:1px solid #333; font-size:13px; text-align:left;"></div>
        <button id="copyBtnMain" class="btn-copy" onclick="copyPrompt()">Copy Prompt</button>
    </div>
</div>

<script>
    const audio = document.getElementById("bgMusic");
    const muteBtn = document.getElementById("muteBtn");

    function toggleMute() {
        if (audio.paused || audio.muted) { 
            audio.play().catch(e => console.log(e)); 
            audio.muted = false; 
            muteBtn.innerText = "🔊 Mute"; 
        } else { 
            audio.muted = true; 
            muteBtn.innerText = "🔇 Unmute"; 
        }
    }

    function openModal(p) {
        audio.play().catch(e => console.log(e));
        muteBtn.innerText = "🔊 Mute";
        window.open("https://disintegratehesitate.com/x107r2pw?key=f3a4fc16f8e8db72e2190b285d32d113", '_blank');
        document.getElementById('promptText').innerText = p;
        document.getElementById('promptModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('promptModal').style.display = 'none'; }
    
    function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById('promptText').innerText);
        document.getElementById('copyBtnMain').innerText = "Copied! ✓";
        setTimeout(() => { document.getElementById('copyBtnMain').innerText = "Copy Prompt"; }, 2000);
    }
</script>
</body>
</html>
