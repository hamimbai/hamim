<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Magic</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; overflow-y: auto; }
        .container { width: 100%; max-width: 480px; text-align: center; padding-bottom: 50px; position: relative; }
        
        /* মিউট বাটন স্টাইল */
        #muteBtn { position: absolute; top: 10px; right: 0; z-index: 1000; padding: 8px 12px; background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid #00f2fe; border-radius: 20px; cursor: pointer; font-size: 12px; }

        .profile-section { margin-top: 20px; margin-bottom: 25px; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 600; margin-top: 10px; color: #fff; }
        .ad-box { width: 100%; margin: 20px 0; min-height: 100px; display: flex; justify-content: center; align-items: center; }
        .btn-telegram { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #0088cc, #00a2ed); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4); transition: 0.3s; margin-bottom: 30px; }
        .btn-telegram:active { transform: scale(0.98); }
        .image-showcase { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 15px; margin-top: 25px; }
        .section-title { font-size: 16px; color: #00f2fe; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .image-grid { display: flex; justify-content: space-between; gap: 12px; }
        .img-box { flex: 1; text-align: center; max-width: 48%; }
        .img-box h4 { font-size: 13px; margin-bottom: 8px; font-weight: 500; }
        .img-box .label-orig { color: #aaa; }
        .img-box .label-edit { color: #00f2fe; }
        .display-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .border-edit { border: 1.5px solid #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .btn-prompt { display: inline-block; margin-top: 15px; padding: 8px 16px; background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid #00f2fe; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-prompt:hover { background: #00f2fe; color: #0d1117; }
        
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background-color: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 16px; max-width: 400px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; right: 15px; top: 10px; color: #aaa; font-size: 24px; cursor: pointer; z-index: 10; }
        .prompt-text { background: #0d1117; padding: 12px; border-radius: 8px; border: 1px solid #30363d; color: #e6edf3; font-size: 14px; margin: 15px 0; text-align: left; white-space: pre-wrap; word-break: break-word; max-height: 250px; overflow-y: auto; }
        .btn-copy { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: auto; }
        .btn-copy:hover { background: #2ea44f; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="site.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <button id="muteBtn" onclick="toggleMute()">🔇 Unmute</button>

        <div class="profile-section">
            <img src="profile.jpg" alt="Profile" class="profile-img">
            <div class="profile-name">@Hamimbai</div>
        </div>

        <div class="ad-box">
            <script type="text/javascript">
                atOptions = { 'key' : 'xxxxxxxxxxxx', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/xxxxxxxxxxxx/invoke.js"></script>
        </div>

        <a href="https://t.me/xred20" target="_blank" class="btn-telegram">🚀 Join Our Telegram Channel</a>

        <div class="image-showcase">
            <div class="section-title">✨ AI Photo Magic Case 1</div>
            <div class="image-grid">
                <div class="img-box"><h4 class="label-orig">Original</h4><img src="original.jpg" class="display-photo"></div>
                <div class="img-box"><h4 class="label-edit">AI Edited</h4><img src="aiedited.jpg" class="display-photo border-edit"></div>
            </div>
            <button class="btn-prompt" onclick="openModal(`{ &quot;task&quot;: &quot;image_restoration_upscale&quot;, &quot;positive_prompt&quot;: &quot;Restore and enhance the provided image. Preserve original identity, facial structure, proportions and composition. High-fidelity photo restoration, ultra-realistic, natural skin texture, accurate details, professional photographic look. 4K output, sharp but natural focus, modern cinematic lighting, subtle volumetric lighting, professional color grading, depth of field, HDR. Shot on Arri Alexa, raw photo aesthetic, masterpiece.&quot;, &quot;negative_prompt&quot;: &quot;Creative reinterpretation, style change, identity alteration, face reshaping, exaggerated features, cartoonish, painting, illustration, over-sharpening, plastic skin, blur, noise, film grain, jpeg artifacts, distortion, bad anatomy, overexposed, underexposed, washed out colors.&quot;, &quot;parameters&quot;: { &quot;steps&quot;: 30, &quot;cfg_scale&quot;: 6.5, &quot;denoising_strength&quot;: 0.45, &quot;upscaler&quot;: &quot;4x_NMKD_Siax_200k&quot;, &quot;target_resolution&quot;: &quot;4K&quot; } }`)">View Prompts</button>
        </div>

        <div class="image-showcase">
            <div class="section-title">✨ AI Photo Magic Case 3</div>
            <div class="image-grid">
                <div class="img-box"><h4 class="label-orig">Original</h4><img src="hamim1.jpg" class="display-photo"></div>
                <div class="img-box"><h4 class="label-edit">AI Edited</h4><img src="hamim1edit.jpg" class="display-photo border-edit"></div>
            </div>
            <button class="btn-prompt" onclick="openModal(`Case 3 Prompt: 
Make a Picture Ultrarealistic
SUBJECT: orang di gambar
ANGLE: Pengambilan gambar full-body vertikal dari sudut rendah menggunakan kamera iphone secara handheld. Terdapat sedikit distorsi lensa wide-angle khas kamera ponsel. Framing terlihat santai dan sedikit tidak di tengah.

ENVIRONMENT: Area parkiran mall outdoor pada malam hari yang sepi. Permukaan aspal rapi dengan garis parkir putih yang masih cukup jelas. Lampu-lampu tinggi khas parkiran mall menerangi area dengan pencahayaan buatan yang agak dingin. Di sekitar terlihat beberapa mobil terparkir berjauhan, dengan latar belakang bangunan mall besar.
LIGHTING: Pencahayaan malam dari lampu parkiran mall yang terang namun tersebar. Bayangan jatuh lembut ke bawah, dengan highlight cukup jelas pada mobil. Ada sedikit noise and grain khas kamera iPhone saat kondisi low-light, serta exposure yang tidak sepenuhnya rata.
FINAL STYLE: Foto kehidupan nyata yang santai, iPhone, tanpa edit...`)">View Prompts</button>
        </div>

        <div class="image-showcase">
            <div class="section-title">✨ AI Photo Magic Case 4</div>
            <div class="image-grid">
                <div class="img-box"><h4 class="label-orig">Original</h4><img src="original_4.jpg" class="display-photo"></div>
                <div class="img-box"><h4 class="label-edit">AI Edited</h4><img src="aiedited_4.jpg" class="display-photo border-edit"></div>
            </div>
            <button class="btn-prompt" onclick="openModal('Case 4 Prompt: Sunset beach aesthetic, warm golden hour lighting, cinematic travel photography, 8k.')">View Prompts</button>
        </div>

        <div class="image-showcase">
            <div class="section-title">✨ AI Photo Magic Case 2</div>
            <div class="image-grid">
                <div class="img-box"><h4 class="label-orig">Original</h4><img src="original.jpg" class="display-photo"></div>
                <div class="img-box"><h4 class="label-edit">AI Edited</h4><img src="aiedited.jpg" class="display-photo border-edit"></div>
            </div>
            <button class="btn-prompt" onclick="openModal('Another prompt example: Cyberpunk city background, glowing lights, anime style aesthetic.')">View Prompts</button>
        </div>
    </div>

    <div id="promptModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="promptText" class="prompt-text">Prompt text will load here...</div>
            <button id="copyBtn" class="btn-copy" onclick="copyPrompt()">Copy Prompt</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById("bgMusic");
        const muteBtn = document.getElementById("muteBtn");
        let currentPrompt = "";

        // মিউজিক ফাংশন
        function playMusic() {
            if (audio.paused) {
                audio.play().catch(e => console.log("User interaction required"));
                muteBtn.innerText = "🔊 Mute";
            }
        }
        function toggleMute() {
            if (audio.muted) { audio.muted = false; muteBtn.innerText = "🔊 Mute"; }
            else { audio.muted = true; muteBtn.innerText = "🔇 Unmute"; }
        }

        function openModal(promptValue) {
            playMusic();
            let adsterraLink = "https://disintegratehesitate.com/x107r2pw?key=f3a4fc16f8e8db72e2190b285d32d113"; 
            window.open(adsterraLink, '_blank');
            currentPrompt = promptValue;
            document.getElementById('promptText').innerText = promptValue;
            document.getElementById('promptModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('promptModal').style.display = 'none'; }
        
        function copyPrompt() {
            navigator.clipboard.writeText(currentPrompt).then(() => {
                let copyBtn = document.getElementById('copyBtn');
                copyBtn.innerText = "Copied! ✓";
                setTimeout(() => copyBtn.innerText = "Copy Prompt", 2000);
            });
        }
    </script>
</body>
</html>
