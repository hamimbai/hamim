<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Magic</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .profile-section {
            margin-top: 20px;
            margin-bottom: 25px;
        }
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            object-fit: cover;
        }
        .profile-name {
            font-size: 20px;
            font-weight: 600;
            margin-top: 10px;
            color: #fff;
        }
        /* Ad Placement Styling */
        .ad-box {
            width: 100%;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Telegram Button */
        .btn-telegram {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0088cc, #00a2ed);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            transition: 0.3s;
            margin-bottom: 30px;
        }
        .btn-telegram:active {
            transform: scale(0.98);
        }
        /* Image Section (Pashapashi Layout) */
        .image-showcase {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
        }
        .section-title {
            font-size: 16px;
            color: #00f2fe;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .image-grid {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .img-box {
            flex: 1;
            text-align: center;
            max-width: 48%;
        }
        .img-box h4 {
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .img-box .label-orig { color: #aaa; }
        .img-box .label-edit { color: #00f2fe; }
        .display-photo {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .border-edit {
            border: 1.5px solid #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="profile-section">
            <img src="aiedited.jpg" alt="Profile" class="profile-img">
            <div class="profile-name">@Hamim_AI</div>
        </div>

        <div class="ad-box">
            <script type="text/javascript">
                atOptions = { 'key' : 'xxxxxxxxxxxx', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/xxxxxxxxxxxx/invoke.js"></script>
            
            </div>

        <a href="https://t.me/xred20" target="_blank" class="btn-telegram">
            🚀 Join Our Telegram Channel
        </a>

        <div class="image-showcase">
            <div class="section-title">✨ AI Photo Magic Case</div>
            
            <div class="image-grid">
                <div class="img-box">
                    <h4 class="label-orig">Original</h4>
                    <img src="original.jpg" alt="Original Pic" class="display-photo">
                </div>
                
                <div class="img-box">
                    <h4 class="label-edit">AI Edited</h4>
                    <img src="aiedited.jpg" alt="Edited Pic" class="display-photo border-edit">
                </div>
            </div>
        </div>

    </div>

</body>
</html>
