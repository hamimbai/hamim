<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Magic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; overflow-y: auto; }
        .container { width: 100%; max-width: 480px; text-align: center; padding-bottom: 50px; position: relative; }
        #muteBtn { position: absolute; top: 10px; right: 0; z-index: 1000; padding: 8px 12px; background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid #00f2fe; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .profile-section { margin-top: 20px; margin-bottom: 25px; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 600; margin-top: 10px; color: #fff; }
        .tg-logo { width: 18px; height: 18px; vertical-align: middle; margin-right: 5px; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 15px; margin-bottom: 20px; }
        .btn-telegram { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #0088cc, #00a2ed); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-bottom: 30px; transition: 0.3s; }
        .image-showcase { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 15px; margin-top: 25px; overflow: hidden; }
        .section-title { font-size: 16px; color: #00f2fe; margin-bottom: 15px; text-transform: uppercase; }
        img-comparison-slider { width: 100%; border-radius: 12px; overflow: hidden; aspect-ratio: 4 / 5; }
        img-comparison-slider img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .btn-prompt { margin-top: 15px; padding: 10px 20px; background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid #00f2fe; border-radius: 20px; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background-color: #161b22; padding: 25px; border-radius: 20px; max-width: 400px; width: 100%; position: relative; border: 1px solid #30363d; }
        .btn-copy { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="site.mp3" type="audio/mpeg"></audio>

<div class="container">
    <button id="muteBtn" onclick="toggleMute()">🔇 Unmute</button>

    <div class="profile-section">
        <img src="profile.jpg" alt="Profile" class="profile-img">
        <div class="profile-name">
            <a href="https://t.me/xred20" target="_blank" style="text-decoration:none; color:white;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="tg-logo">@Hamimbai
            </a>
        </div>
        <div class="social-links">
            <a href="https://www.facebook.com/share/1D7jsTdZXV/?mibextid=wwXIfr" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="30" height="30"></a>
            <a href="https://www.instagram.com/hamim_xm?igsh=a21vcGZnNTQ2MW9m&utm_source=qr" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" width="30" height="30"></a>
        </div>
    </div>

    <div style="color:#fff; margin-bottom:20px;">
        <p style="font-weight:bold;">Please Join Our Telegram Channel To Get Prompts Easy And Earn Money</p><br>
        <p style="font-weight:bold; color:#00f2fe;">আমাদের টেলিগ্রাম চ্যানেলে জয়েন করুন আরো সুবিধা পেতে 👇</p>
    </div>

    <a href="https://t.me/xred20" target="_blank" class="btn-telegram">🚀 Join Our Telegram Channel</a>

    <div class="image-showcase">
        <div class="section-title">✨ AI Photo Magic Case 1</div>
        <img-comparison-slider>
            <img slot="first" src="original.jpg">
            <img slot="second" src="aiedited.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 1 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>

    <div class="image-showcase">
        <div class="section-title">✨ AI Photo Magic Case 2</div>
        <img-comparison-slider>
            <img slot="first" src="original.jpg">
            <img slot="second" src="aiedited.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 2 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>

    <div class="image-showcase">
        <div class="section-title">✨ AI Photo Magic Case 3</div>
        <img-comparison-slider>
            <img slot="first" src="hamim1.jpg">
            <img slot="second" src="hamim1edit.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 3 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>

    <div class="image-showcase">
        <div class="section-title">✨ AI Photo Magic Case 4</div>
        <img-comparison-slider>
            <img slot="first" src="original_4.jpg">
            <img slot="second" src="aiedited_4.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 4 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>
</div>

<div id="promptModal" class="modal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer; color:white; font-size:24px;" onclick="closeModal()">✕</span>
        <h3 style="color:#00f2fe; margin-bottom:15px;">Prompt</h3>
        <div id="promptText" style="margin:15px 0; color:#fff; background:#0d1117; padding:15px; border-radius:10px; border:1px solid #30363d; font-size:14px; text-align:left;"></div>
        <button id="copyBtnMain" class="btn-copy" onclick="copyPrompt()">Copy Prompt</button>
    </div>
</div>

<script>
    const audio = document.getElementById("bgMusic");
    const muteBtn = document.getElementById("muteBtn");
    function toggleMute() {
        if (audio.paused || audio.muted) { audio.play(); audio.muted = false; muteBtn.innerText = "🔊 Mute"; }
        else { audio.muted = true; muteBtn.innerText = "🔇 Unmute"; }
    }
    function openModal(p) {
        window.open("https://disintegratehesitate.com/x107r2pw?key=f3a4fc16f8e8db72e2190b285d32d113", '_blank');
        document.getElementById('promptText').innerText = p;
        document.getElementById('promptModal').style.display = 'flex';
        document.getElementById('copyBtnMain').innerText = "Copy Prompt";
    }
    function closeModal() { document.getElementById('promptModal').style.display = 'none'; }
    function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById('promptText').innerText);
        document.getElementById('copyBtnMain').innerText = "Copied! ✓";
    }
</script>
</body>
</html>
