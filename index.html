<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Magic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <style>
        body { background: #050505; color: #ffffff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; margin-bottom: 25px; }
        img-comparison-slider { width: 100%; border-radius: 20px; overflow: hidden; --divider-color: rgba(255, 255, 255, 0.5); --handle-color: #ffffff; cursor: pointer; aspect-ratio: 4/5; }
        img-comparison-slider img { width: 100%; height: 100%; object-fit: cover; }
        .btn-prompt { width: 100%; margin-top: 15px; padding: 14px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; padding: 25px; border-radius: 24px; width: 100%; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin: 40px 0;">
        <img src="profile.jpg" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff;">
        <h1 style="font-size: 24px; margin-top: 15px;">@Hamimbai</h1>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 15px; opacity: 0.8; font-size: 14px;">✨ AI PHOTO MAGIC CASE 1</h3>
        <img-comparison-slider>
            <img slot="first" src="original.jpg">
            <img slot="second" src="aiedited.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 1 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 15px; opacity: 0.8; font-size: 14px;">✨ AI PHOTO MAGIC CASE 2</h3>
        <img-comparison-slider>
            <img slot="first" src="original.jpg">
            <img slot="second" src="aiedited.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 2 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 15px; opacity: 0.8; font-size: 14px;">✨ AI PHOTO MAGIC CASE 3</h3>
        <img-comparison-slider>
            <img slot="first" src="hamim1.jpg">
            <img slot="second" src="hamim1edit.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 3 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 15px; opacity: 0.8; font-size: 14px;">✨ AI PHOTO MAGIC CASE 4</h3>
        <img-comparison-slider>
            <img slot="first" src="original_4.jpg">
            <img slot="second" src="aiedited_4.jpg">
        </img-comparison-slider>
        <button class="btn-prompt" onclick="openModal('আপনার Case 4 এর প্রম্পট এখানে দিন')">View Prompt</button>
    </div>
</div>

<div id="promptModal" class="modal">
    <div class="modal-content">
        <p id="promptText" style="margin-bottom: 20px; text-align: left;"></p>
        <button class="btn-prompt" onclick="copyPrompt()">Copy Prompt</button>
        <button class="btn-prompt" style="background:transparent; color:#fff; border:1px solid #333;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    function openModal(p) { 
        document.getElementById('promptText').innerText = p; 
        document.getElementById('promptModal').style.display = 'flex'; 
    }
    function closeModal() { document.getElementById('promptModal').style.display = 'none'; }
    function copyPrompt() { navigator.clipboard.writeText(document.getElementById('promptText').innerText); alert('Copied!'); }
</script>
</body>
</html>
